version: 2.1

orbs:
  gradle: circleci/gradle@4.1.0
  codecov: codecov/codecov@5.4.3

executors:
  openjdk:
    docker:
      - image: cimg/openjdk:21.0
  renovate:
    docker:
      - image: renovate/renovate:latest

jobs:
  setup-workspace:
    executor: openjdk
    steps:
      - checkout
      - run: ./gradlew dependencies
      - persist_to_workspace:
          root: .
          paths: [.]
  run-lint:
    executor: openjdk
    steps:
      - attach_workspace:
          at: .
      - run: ./gradlew codenarcMain codenarcTest
  upload-coverage:
    executor: openjdk
    steps:
      - checkout
      - run: ./gradlew jacocoTestReport
      - codecov/upload

workflows:
  code-analysis:
    jobs:
      - setup-workspace
      - run-lint:
          requires: [setup-workspace]
      - upload-coverage:
          requires: [setup-workspace]
      - activate-renovatebot
